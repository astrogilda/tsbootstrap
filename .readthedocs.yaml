# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Read the Docs is a hosted builder; it installs the docs dependencies with its
# native pip step (uv governs the project's own CI and release pipelines). The
# notebook gallery is rendered by nbsphinx, which needs pandoc, and the Read the
# Docs image does not ship pandoc by default.
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - pandoc

sphinx:
  configuration: docs/source/conf.py

formats:
  - pdf
  - epub

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - models
