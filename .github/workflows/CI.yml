name: CI

# Minimal permissions following the principle of least privilege
permissions:
  contents: read

# Trigger CI on pushes to main and pull requests targeting main or release branches
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - 'release**'
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'

jobs:
  # Lint and static checks (fast, fails early)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv and Python 3.11
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  # Static type checking: both mypy and pyright must reach zero errors (blocking).
  types:
    name: Types (mypy + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src/tsbootstrap

      - name: Run pyright
        run: uv run pyright src/tsbootstrap

  # Run the full test suite across the supported OS and Python matrix
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Supported Python versions per pyproject (>=3.10,<3.14)
        python-version: ['3.10', '3.11', '3.12', '3.13']
        # OS versions:
        # - ubuntu-latest: Ubuntu 24.04 LTS
        # - macos-latest: macOS on Apple Silicon
        # - windows-latest: Windows Server 2022
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Show installed dependencies
        run: uv pip list

      # Run the full suite once, including the slow statistical gate, under xdist
      # as configured in pyproject [tool.pytest.ini_options], with coverage.
      - name: Run tests
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest tests/ --cov=src/tsbootstrap --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ runner.os }}
          path: coverage.xml
          if-no-files-found: warn

      - name: Publish code coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Build and test documentation
  docs:
    name: Test Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python 3.11
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync documentation environment
        run: uv sync --extra docs --extra models

      - name: Build Sphinx documentation
        run: |
          uv run make -C docs clean
          uv run make -C docs html SPHINXOPTS="-W -v"

      - name: Upload built docs
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-results
          path: docs/build/html/
