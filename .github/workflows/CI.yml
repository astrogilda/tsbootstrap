name: CI

# Minimal permissions following the principle of least privilege
permissions:
  contents: read

# Trigger CI on pushes to main and pull requests targeting main or release branches
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - 'release**'
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'docs/**'

jobs:
  # Lint and static checks (fast, fails early)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # Run the full test suite across the supported OS and Python matrix
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Supported Python versions per pyproject (>=3.10,<3.13)
        python-version: ['3.10', '3.11', '3.12']
        # OS versions:
        # - ubuntu-latest: Ubuntu 24.04 LTS
        # - macos-latest: macOS on Apple Silicon
        # - windows-latest: Windows Server 2022
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed dependencies
        run: pip list

      # Run the full suite once, including the slow statistical gate, under xdist
      # as configured in pyproject [tool.pytest.ini_options], with coverage.
      - name: Run tests
        run: pytest tests/ --cov=src/tsbootstrap --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ runner.os }}
          path: coverage.xml
          if-no-files-found: warn

      - name: Publish code coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Build and test documentation
  docs:
    name: Test Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,models]"

      - name: Build Sphinx documentation
        run: |
          cd docs
          make clean
          make html SPHINXOPTS="-W -v"

      - name: Upload built docs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-results
          path: docs/build/html/
