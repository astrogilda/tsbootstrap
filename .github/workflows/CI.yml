name: CI

# Cancel superseded runs of the same branch or pull request.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_MALWARE_CHECK: '1' # abort any uv resolution that hits an OSV malicious-package record

# Minimal permissions following the principle of least privilege
permissions:
  contents: read

# Trigger CI on pushes to main and pull requests targeting main or release branches
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - 'release**'
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/CI.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'

jobs:
  # Lint and static checks (fast, fails early)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv and Python 3.11
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync dev environment
        run: uv sync --extra dev --extra mcp

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  # Static type checking: both mypy and pyright must reach zero errors (blocking).
  types:
    name: Types (mypy + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dev environment
        run: uv sync --extra dev --extra mcp

      - name: Run mypy
        run: uv run mypy src/tsbootstrap

      - name: Run pyright
        run: uv run pyright src/tsbootstrap

  # Run the full test suite across the supported OS and Python matrix
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Supported Python versions per pyproject (>=3.10,<3.14)
        python-version: ['3.10', '3.11', '3.12', '3.13']
        # OS versions:
        # - ubuntu-latest: Ubuntu 24.04 LTS
        # - macos-latest: macOS on Apple Silicon
        # - windows-latest: Windows Server 2022
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dev environment
        run: uv sync --extra dev --extra mcp

      - name: Show installed dependencies
        run: uv pip list

      # Run the full suite once, including the slow statistical gate, under xdist
      # as configured in pyproject [tool.pytest.ini_options], with coverage.
      - name: Run tests
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest tests/ --cov=src/tsbootstrap --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.python-version }}-${{ runner.os }}
          path: coverage.xml
          if-no-files-found: warn

      - name: Publish code coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Per-file coverage gate (blocking). Unlike codecov.io (which is
  # informational only, see codecov.yml) this fails the build when any single
  # source file drops below 80% line coverage. Runs once on ubuntu + Python
  # 3.12; coverage is platform- and version-agnostic for this pure-Python
  # library, so one cell is the authority.
  coverage-gate:
    name: Per-file coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dev environment
        run: uv sync --extra dev --extra mcp

      - name: Run tests with coverage
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest tests/ --cov=src/tsbootstrap --cov-report=xml

      - name: Generate coverage.json
        run: uv run coverage json -o coverage.json

      - name: Enforce per-file coverage threshold (>=80%)
        # Excluded files are justified in the docstring table inside
        # scripts/coverage_per_file.py. The only exclusion is the package
        # __init__ re-export surface, which carries no logic.
        run: |
          test -s coverage.json || { echo 'coverage.json missing or empty: the coverage run did not produce data on this cell' >&2; exit 1; }
          uv run python scripts/coverage_per_file.py coverage.json \
            --exclude src/tsbootstrap/__init__.py

  # Execute the tutorial notebooks (issue #46: notebooks must run in CI).
  # This is the execution authority; the docs build only renders committed outputs.
  notebooks:
    name: Execute tutorial notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv and Python 3.11
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Sync the examples environment with nbmake
        run: uv sync --extra examples --extra dev

      - name: Execute notebooks
        run: uv run pytest --nbmake --nbmake-timeout=300 docs/source/tutorials/

  # Build and test documentation
  docs:
    name: Test Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv and Python 3.11
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Install pandoc (required by nbsphinx)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Sync documentation environment
        run: uv sync --extra docs --extra models

      - name: Build Sphinx documentation
        run: |
          uv run make -C docs clean
          uv run make -C docs html SPHINXOPTS="-W -v"

      - name: Upload built docs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-results
          path: docs/build/html/
