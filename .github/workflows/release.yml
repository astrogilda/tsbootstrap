name: Build wheels and publish to PyPI

env:
  UV_MALWARE_CHECK: '1' # abort any uv resolution that hits an OSV malicious-package record

on:
  release:
    types: [published]

# Least-privilege default; the publish job alone adds id-token for OIDC. The release
# path also runs with the uv cache disabled (a poisoned cache restored into the build
# job could reach the published artifacts) and with checkout credentials dropped.
permissions: {}

# Serialize wheel builds and uploads; never cancel a publish mid-flight.
concurrency:
  group: release

jobs:
  build_wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv and Python 3.10
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false
          python-version: '3.10'

      - name: Build wheel and sdist
        run: |
          rm -rf dist/ build/ wheelhouse/  # Clean up previous builds
          uv build --wheel --sdist --out-dir wheelhouse

      - name: Store wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels
          path: wheelhouse/*

  test_unix_wheels:
    needs: build_wheels
    name: Test wheels on ${{ matrix.os }} with ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # checkout
    strategy:
      fail-fast: false  # to not fail all combinations if just one fail
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels
          path: wheelhouse

      - name: Display downloaded artifacts
        run: ls -l wheelhouse

      - name: Get wheel filename
        run: echo "WHEELNAME=$(ls ./wheelhouse/tsbootstrap-*none-any.whl)" >> $GITHUB_ENV

      - name: Install wheel and extras into a fresh venv
        run: |
          uv venv
          uv pip install "${WHEELNAME}[dev]"

      - name: Run tests
        run: uv run --no-project python -m pytest tests/

  test_windows_wheels:
    needs: build_wheels
    name: Test wheels on ${{ matrix.os }} with ${{ matrix.python-version }}
    runs-on: windows-latest
    permissions:
      contents: read # checkout
    strategy:
      fail-fast: false  # to not fail all combinations if just one fail
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels
          path: wheelhouse

      - name: Display downloaded artifacts
        run: ls -l wheelhouse

      - name: Get wheel filename
        run: echo "WHEELNAME=$(ls ./wheelhouse/tsbootstrap-*none-any.whl)" >> $env:GITHUB_ENV

      - name: Install wheel and extras into a fresh venv
        run: |
          uv venv
          uv pip install "${env:WHEELNAME}[dev]"

      - name: Run tests  # explicit commands as windows does not support make
        run: uv run --no-project python -m pytest tests/

  upload_wheels:
    name: Upload wheels to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels,test_unix_wheels,test_windows_wheels]
    # OIDC trusted publishing: the id-token permission lets PyPI verify this
    # workflow's identity directly, so no long-lived API token (and no
    # PYPI_TOKEN secret) is needed. attestations: true emits PEP 740
    # provenance for the uploaded distributions.
    permissions:
      id-token: write # PyPI trusted publishing verifies the workflow identity via OIDC

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels
          path: wheelhouse

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
          attestations: true
