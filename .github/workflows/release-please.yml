name: Release Please

# Maintains a rolling release pull request that bumps the version across all
# version files and updates CHANGELOG.md from Conventional Commits. Merging that
# PR tags the commit and publishes a GitHub Release, which in turn triggers
# release.yml (PyPI) and mcp-publish.yml (MCP registry) via the
# release.published event.

on:
  push:
    branches:
      - main

permissions: {}

# Serialize per branch; never cancel an in-flight release PR update.
concurrency:
  group: release-please-${{ github.ref }}

jobs:
  release-please:
    name: Maintain the release pull request
    runs-on: ubuntu-latest
    permissions:
      contents: write # zizmor: ignore[excessive-permissions] release-please tags commits and publishes the GitHub Release
      pull-requests: write # zizmor: ignore[excessive-permissions] release-please maintains the rolling release pull request
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Use a PAT, not the default GITHUB_TOKEN: a release made with the default
          # token will not trigger the publish workflow (release.yml).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
